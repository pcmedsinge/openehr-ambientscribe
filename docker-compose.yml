services:
  db:
    image: postgres:14-alpine
    container_name: ambientscribe-postgres
    environment:
      POSTGRES_USER: ehrbase
      POSTGRES_PASSWORD: ehrbase
      POSTGRES_DB: ehrbase
    ports:
      - "5436:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ehrbase -d ehrbase"]
      interval: 5s
      timeout: 5s
      retries: 20

  ehrbase:
    image: ehrbase/ehrbase:0.30.0
    container_name: ambientscribe-ehrbase
    ports:
      - "8086:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/ehrbase
      DB_USER: ehrbase
      DB_PASS: ehrbase
      SECURITY_AUTHTYPE: BASIC
      SECURITY_AUTHUSER: ehrbase-user
      SECURITY_AUTHPASSWORD: SuperSecretPassword1
      SERVER_NODENAME: local.ambientscribe.org
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
