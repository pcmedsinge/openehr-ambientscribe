services:
  db:
    image: ehrbase/ehrbase-postgres:latest
    container_name: ambientscribe-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      EHRBASE_USER_ADMIN: ehrbase
      EHRBASE_PASSWORD_ADMIN: ehrbase
      EHRBASE_USER: ehrbase_restricted
      EHRBASE_PASSWORD: ehrbase_restricted
    ports:
      - "5436:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ehrbase -d ehrbase"]
      interval: 5s
      timeout: 5s
      retries: 20

  ehrbase:
    image: ehrbase/ehrbase:0.30.0
    container_name: ambientscribe-ehrbase
    ports:
      - "8086:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/ehrbase
      DB_USER: ehrbase_restricted
      DB_PASS: ehrbase_restricted
      DB_USER_ADMIN: ehrbase
      DB_PASS_ADMIN: ehrbase
      SECURITY_AUTHTYPE: BASIC
      SECURITY_AUTHUSER: ehrbase-user
      SECURITY_AUTHPASSWORD: SuperSecretPassword1
      SERVER_NODENAME: local.ambientscribe.org
      SYSTEM_ALLOWTEMPLATEOVERWRITE: "true"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
